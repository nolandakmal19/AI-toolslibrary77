<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TOOLS LIBRARY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Mengaplikasikan font Roboto ke seluruh halaman */
        body {
            font-family: 'Roboto', sans-serif;
        }
        
        /* Animasi untuk item baru dan pesan notifikasi */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        .fade-out {
            animation: fadeOut 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-black to-blue-900 text-white min-h-screen">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold tracking-wider">AI TOOLS LIBRARY💻</h1>
            <p class="text-blue-300 text-sm">Save all usefull AI links.</p>
        </header>

        <section id="add-form-section" class="bg-gray-900/50 backdrop-blur-sm p-4 rounded-xl mb-8 border border-gray-700">
            <form id="add-bookmark-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label for="website-name" class="block text-xs mb-1 text-blue-200">Website Name</label>
                    <input type="text" id="website-name" placeholder="ex: Google" class="w-full bg-gray-800/80 border border-gray-600 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                </div>
                <div class="md:col-span-1">
                    <label for="website-url" class="block text-xs mb-1 text-blue-200">URL Website</label>
                    <input type="url" id="website-url" placeholder="https://google.com" class="w-full bg-gray-800/80 border border-gray-600 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                </div>
                <div class="md:col-span-1">
                    <label for="category-select" class="block text-xs mb-1 text-blue-200">Category</label>
                    <select id="category-select" class="w-full bg-gray-800/80 border border-gray-600 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        <option value="new-category">-- Create new category --</option>
                    </select>
                    <input type="text" id="new-category-name" placeholder="Nama kategori baru..." class="w-full bg-gray-800/80 border border-gray-600 rounded-md px-3 py-2 text-sm mt-2 hidden focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                <div class="md:col-span-1">
                    <button type="submit" class="w-full bg-black-600 hover:bg-black-500 text-white font-bold py-2 px-4 rounded-md transition-all duration-300 transform hover:scale-105">Add</button>
                </div>
            </form>
        </section>

        <main id="bookmark-list-container">
            </main>

    </div>

    <div id="delete-confirm-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-gray-800 border border-blue-500/50 rounded-lg p-6 max-w-sm text-center shadow-2xl fade-in">
            <h3 class="text-lg font-bold mb-2">confirmation deleted</h3>
            <p class="text-gray-300 mb-6">Are you sure to delete this?</p>
            <div class="flex justify-center gap-4">
                <button id="confirm-delete-btn" class="bg-black-600 hover:bg-black-500 text-white font-bold py-2 px-6 rounded-md transition">yes, delete it</button>
                <button id="cancel-delete-btn" class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-6 rounded-md transition">no</button>
            </div>
        </div>
    </div>
    
    <div id="success-toast" class="fixed bottom-5 right-5 bg-green-500 text-white py-2 px-5 rounded-lg shadow-xl hidden">
        <p>Pesan sukses!</p>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === ELEMEN DOM ===
            const form = document.getElementById('add-bookmark-form');
            const nameInput = document.getElementById('website-name');
            const urlInput = document.getElementById('website-url');
            const categorySelect = document.getElementById('category-select');
            const newCategoryInput = document.getElementById('new-category-name');
            const listContainer = document.getElementById('bookmark-list-container');
            
            const deleteModal = document.getElementById('delete-confirm-modal');
            const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
            const cancelDeleteBtn = document.getElementById('cancel-delete-btn');

            const successToast = document.getElementById('success-toast');

            // === STATE & LOCALSTORAGE ===
            let bookmarks = {};
            let itemToDelete = { category: null, index: null };

            function loadData() {
                const storedData = localStorage.getItem('AI Library');
                bookmarks = storedData ? JSON.parse(storedData) : {
                    'AI Search engines': [
                        { name: 'TechCrunch', url: 'https://techcrunch.com' },
                        { name: 'The Verge', url: 'https://www.theverge.com' }
                    ],
                    'Design': [
                        { name: 'Dribbble', url: 'https://dribbble.com' },
                    ]
                };
            }

            function saveData() {
                localStorage.setItem('bookmarkManagerData', JSON.stringify(bookmarks));
            }

            // === FUNGSI RENDER ===
            function renderBookmarks() {
                listContainer.innerHTML = '';
                updateCategoryDropdown();

                if (Object.keys(bookmarks).length === 0) {
                    listContainer.innerHTML = `<div class="text-center text-gray-400 p-8 bg-gray-900/30 rounded-lg">
                        <p class="text-lg">Belum ada bookmark.</p>
                        <p class="text-sm">Mulai tambahkan link favoritmu menggunakan form di atas!</p>
                    </div>`;
                    return;
                }

                for (const category in bookmarks) {
                    if (bookmarks[category].length === 0) continue;

                    const categorySection = document.createElement('section');
                    categorySection.className = 'mb-8';

                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'inline-block bg-black-300 text-white text-lg font-bold px-5 py-1 rounded-full mb-4';
                    categoryTitle.textContent = category;
                    categorySection.appendChild(categoryTitle);

                    const linkList = document.createElement('ul');
                    
                    bookmarks[category].forEach((bookmark, index) => {
                        const listItem = document.createElement('li');
                        listItem.className = 'flex items-center justify-between bg-gray-900/60 hover:bg-gray-800/80 p-3 rounded-lg mb-2 border border-gray-700/50 transition-all duration-300 fade-in';
                        
                        const faviconUrl = `https://www.google.com/s2/favicons?domain=${bookmark.url}&sz=32`;

                        listItem.innerHTML = `
                            <a href="${bookmark.url}" target="_blank" rel="noopener noreferrer" class="flex items-center truncate">
                                <img src="${faviconUrl}" alt="logo" class="w-6 h-6 mr-4 flex-shrink-0">
                                <span class="truncate pr-4">${bookmark.name}</span>
                            </a>
                            <button data-category="${category}" data-index="${index}" class="delete-btn text-gray-500 hover:text-blue-500 transition-colors p-1 rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        `;
                        linkList.appendChild(listItem);
                    });

                    categorySection.appendChild(linkList);
                    listContainer.appendChild(categorySection);
                }
                
                // Tambahkan event listener ke semua tombol hapus
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', handleDeleteClick);
                });
            }

            function updateCategoryDropdown() {
                const existingOptions = Array.from(categorySelect.options).map(opt => opt.value);
                const currentCategories = Object.keys(bookmarks);

                // Hapus opsi yang kategorinya sudah tidak ada
                existingOptions.forEach(val => {
                    if (val !== 'new-category' && !currentCategories.includes(val)) {
                        const optionToRemove = categorySelect.querySelector(`option[value="${val}"]`);
                        if (optionToRemove) optionToRemove.remove();
                    }
                });

                // Tambahkan opsi untuk kategori baru
                currentCategories.forEach(category => {
                    if (!existingOptions.includes(category)) {
                        const option = document.createElement('option');
                        option.value = category;
                        option.textContent = category;
                        categorySelect.insertBefore(option, categorySelect.options[0]);
                    }
                });
                // Set default ke opsi pertama jika ada
                if (categorySelect.options.length > 1) {
                    categorySelect.selectedIndex = 0;
                }
            }


            // === FUNGSI EVENT HANDLER ===
            function handleFormSubmit(e) {
                e.preventDefault();

                const name = nameInput.value.trim();
                let url = urlInput.value.trim();
                let category = categorySelect.value;
                const newCategory = newCategoryInput.value.trim();

                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }

                if (category === 'new-category') {
                    if (!newCategory) {
                        alert('Nama kategori baru tidak boleh kosong!');
                        return;
                    }
                    category = newCategory;
                    if (!bookmarks[category]) {
                        bookmarks[category] = [];
                    }
                }

                bookmarks[category].push({ name, url });
                
                saveData();
                renderBookmarks();
                showToast(`"${name}" berhasil ditambahkan!`);
                
                form.reset();
                newCategoryInput.classList.add('hidden');
            }

            function handleDeleteClick(e) {
                const button = e.currentTarget;
                itemToDelete.category = button.dataset.category;
                itemToDelete.index = parseInt(button.dataset.index, 10);
                
                deleteModal.classList.remove('hidden');
            }
            
            function confirmDeletion() {
                if (itemToDelete.category !== null && itemToDelete.index !== null) {
                    const deletedItem = bookmarks[itemToDelete.category].splice(itemToDelete.index, 1);
                    
                    // Hapus kategori jika kosong
                    if (bookmarks[itemToDelete.category].length === 0) {
                        delete bookmarks[itemToDelete.category];
                        const optionToRemove = categorySelect.querySelector(`option[value="${itemToDelete.category}"]`);
                        if(optionToRemove) optionToRemove.remove();
                    }

                    saveData();
                    renderBookmarks();
                    showToast(`"${deletedItem[0].name}" berhasil dihapus.`);
                    closeDeleteModal();
                }
            }

            function closeDeleteModal() {
                deleteModal.classList.add('hidden');
                itemToDelete = { category: null, index: null };
            }
            
            function handleCategoryChange() {
                if (categorySelect.value === 'new-category') {
                    newCategoryInput.classList.remove('hidden');
                    newCategoryInput.focus();
                } else {
                    newCategoryInput.classList.add('hidden');
                }
            }

            function showToast(message) {
                successToast.textContent = message;
                successToast.classList.remove('hidden');
                successToast.classList.add('fade-in');

                setTimeout(() => {
                    successToast.classList.remove('fade-in');
                    successToast.classList.add('fade-out');
                    setTimeout(() => {
                         successToast.classList.add('hidden');
                         successToast.classList.remove('fade-out');
                    }, 500);
                }, 3000);
            }

            // === INISIALISASI & EVENT LISTENERS ===
            form.addEventListener('submit', handleFormSubmit);
            categorySelect.addEventListener('change', handleCategoryChange);
            confirmDeleteBtn.addEventListener('click', confirmDeletion);
            cancelDeleteBtn.addEventListener('click', closeDeleteModal);

            loadData();
            renderBookmarks();
            handleCategoryChange(); // Panggil sekali untuk inisialisasi
        });
    </script>
</body>
</html>
